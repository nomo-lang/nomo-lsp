name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            archive: zip

    env:
      ASSET_NAME: nomo-lsp-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}
      NOMO_REF: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'main' }}

    steps:
      - name: Checkout nomo-lsp
        uses: actions/checkout@v5
        with:
          path: nomo-lsp

      - name: Checkout matching compiler
        uses: actions/checkout@v5
        with:
          repository: nomo-lang/nomo
          ref: ${{ env.NOMO_REF }}
          path: nomo

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: nomo-lsp
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)
          test "$GITHUB_REF_NAME" = "v$version"

      - name: Build release binary
        working-directory: nomo-lsp
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package Unix binary
        if: runner.os != 'Windows'
        working-directory: nomo-lsp
        shell: bash
        run: |
          mkdir release
          cp "target/${{ matrix.target }}/release/nomo-lsp" release/
          cp README.md LICENSE release/
          tar -C release -czf "$ASSET_NAME" nomo-lsp README.md LICENSE

      - name: Package Windows binary
        if: runner.os == 'Windows'
        working-directory: nomo-lsp
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item "target/${{ matrix.target }}/release/nomo-lsp.exe" release/
          Copy-Item README.md, LICENSE release/
          Compress-Archive -Path release/* -DestinationPath $env:ASSET_NAME

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: nomo-lsp/${{ env.ASSET_NAME }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum nomo-lsp-* > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --generate-notes \
              --verify-tag \
              --title "Nomo Language Server $GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY"
          fi
